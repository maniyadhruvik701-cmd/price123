<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="auth-container">
        <!-- Sign In Form -->
        <div class="form-container" id="signInForm">
            <h2>Sign In</h2>
            <form onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label for="signin-email">Email:</label>
                    <input type="email" id="signin-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="signin-password">Password:</label>
                    <input type="password" id="signin-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <p class="toggle-text">Don't have an account? <a href="#" onclick="toggleForms()">Sign Up</a></p>
        </div>

        <!-- Sign Up Form -->
        <div class="form-container hidden" id="signUpForm">
            <h2>Sign Up</h2>
            <form onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label for="signup-name">Full Name:</label>
                    <input type="text" id="signup-name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email:</label>
                    <input type="email" id="signup-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password:</label>
                    <input type="password" id="signup-password" required placeholder="Enter your password">
                </div>
                <div class="form-group">
                    <label for="signup-confirm">Confirm Password:</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            <p class="toggle-text">Already have an account? <a href="#" onclick="toggleForms()">Sign In</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
